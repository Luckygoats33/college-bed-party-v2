<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="bedGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3d6e"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pennantGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ff3d6e"/>
    </linearGradient>
  </defs>

  <!-- ═══ ICON: bed + pennant ═══ -->

  <!-- Bed frame base -->
  <rect x="6" y="46" width="62" height="10" rx="3" fill="url(#bedGrad)"/>

  <!-- Headboard -->
  <rect x="6" y="28" width="10" height="28" rx="3" fill="url(#bedGrad)"/>

  <!-- Footboard -->
  <rect x="58" y="38" width="10" height="18" rx="3" fill="url(#bedGrad)"/>

  <!-- Mattress / duvet -->
  <rect x="16" y="38" width="44" height="12" rx="4" fill="#fefcf8" stroke="url(#bedGrad)" stroke-width="2"/>

  <!-- Pillow -->
  <rect x="18" y="34" width="16" height="10" rx="3" fill="#fefcf8" stroke="#ff3d6e" stroke-width="1.5"/>

  <!-- Duvet stripe accent -->
  <rect x="36" y="39" width="20" height="3" rx="1.5" fill="#ff3d6e" opacity="0.25"/>

  <!-- Pennant pole -->
  <line x1="37" y1="8" x2="37" y2="38" stroke="#0a0a0f" stroke-width="2" stroke-linecap="round"/>

  <!-- Pennant flag -->
  <polygon points="37,10 58,18 37,26" fill="url(#pennantGrad)"/>

  <!-- Stars on pennant -->
  <circle cx="46" cy="18" r="1.5" fill="#fefcf8" opacity="0.9"/>
  <circle cx="52" cy="15" r="1" fill="#fefcf8" opacity="0.7"/>
  <circle cx="52" cy="21" r="1" fill="#fefcf8" opacity="0.7"/>

  <!-- Legs -->
  <rect x="10" y="54" width="5" height="6" rx="1.5" fill="#0a0a0f" opacity="0.6"/>
  <rect x="59" y="54" width="5" height="6" rx="1.5" fill="#0a0a0f" opacity="0.6"/>

  <!-- ═══ WORDMARK ═══ -->

  <!-- COLLEGE -->
  <text x="84" y="36"
    font-family="'Geist', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="700"
    letter-spacing="0.18em"
    fill="#6b6b76"
    text-anchor="start">COLLEGE</text>

  <!-- BED PARTY -->
  <text x="82" y="60"
    font-family="'Geist', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="900"
    letter-spacing="-0.02em"
    fill="#0a0a0f"
    text-anchor="start">BED PARTY</text>

  <!-- Hot pink underline accent -->
  <rect x="82" y="64" width="230" height="3" rx="1.5" fill="url(#bedGrad)"/>
</svg>
